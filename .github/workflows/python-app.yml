name: Application checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python-services:
    name: Python service tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: emotional_support_test
          POSTGRES_USER: support_app
          POSTGRES_PASSWORD: support_app_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U support_app -d emotional_support_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - safety-service
          - chat-service
          - save-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile service
        working-directory: ${{ matrix.service }}
        run: python -m compileall app tests

      - name: Run tests
        working-directory: ${{ matrix.service }}
        env:
          TEST_DATABASE_URL: postgresql://support_app:support_app_dev_password@localhost:5432/emotional_support_test
        run: python -m pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build service images
        run: docker compose build
