name: emotional-support-platform

services:
  safety-service:
    build:
      context: ./safety-service
    env_file:
      - .env
    environment:
      SAFETY_MODEL: ${SAFETY_MODEL:-gemini-2.5-flash-lite}
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
    env_file:
      - .env
    environment:
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash}
    ports:
      - "8002:8002"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  save-service:
    build:
      context: ./save-service
    environment:
      DATABASE_URL: postgresql://support_app:${POSTGRES_PASSWORD:-support_app_dev_password}@postgres:5432/emotional_support
      CHAT_RETENTION_DAYS: ${CHAT_RETENTION_DAYS:-10}
      CHAT_MAX_SAVED_CHATS: ${CHAT_MAX_SAVED_CHATS:-10}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8003:8003"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emotional_support}
      POSTGRES_USER: ${POSTGRES_USER:-support_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support_app_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-support_app} -d ${POSTGRES_DB:-emotional_support}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  gateway-service:
    build:
      context: ./gateway-service
    env_file:
      - .env
    environment:
      SAFETY_SERVICE_URL: ${SAFETY_SERVICE_URL:-http://safety-service:8001}
      CHAT_SERVICE_URL: ${CHAT_SERVICE_URL:-http://chat-service:8002}
      SAVE_SERVICE_URL: ${SAVE_SERVICE_URL:-http://save-service:8003}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-replace-this-development-auth-secret}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}'
    depends_on:
      safety-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      save-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      gateway-service:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  postgres-data:
