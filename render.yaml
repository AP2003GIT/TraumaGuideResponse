services:
  - type: web
    name: trauma-guide-safety
    runtime: python
    plan: free
    rootDir: safety-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: GEMINI_API_KEY
        sync: false
      - key: SAFETY_MODEL
        value: gemini-2.5-flash-lite

  - type: web
    name: trauma-guide-chat
    runtime: python
    plan: free
    rootDir: chat-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: GEMINI_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: gemini-2.5-flash

  - type: web
    name: trauma-guide-save
    runtime: python
    plan: free
    rootDir: save-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DATABASE_URL
        fromDatabase:
          name: trauma-guide-db
          property: connectionString
      - key: CHAT_RETENTION_DAYS
        value: 10
      - key: CHAT_MAX_SAVED_CHATS
        value: 10
      - key: ADMIN_EMAILS
        value: '["developer@local.dev"]'

  - type: web
    name: trauma-guide-gateway
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd gateway-service && gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: SAFETY_SERVICE_HOST
        fromService:
          type: web
          name: trauma-guide-safety
          property: host
      - key: SAFETY_SERVICE_PORT
        fromService:
          type: web
          name: trauma-guide-safety
          property: port
      - key: CHAT_SERVICE_HOST
        fromService:
          type: web
          name: trauma-guide-chat
          property: host
      - key: CHAT_SERVICE_PORT
        fromService:
          type: web
          name: trauma-guide-chat
          property: port
      - key: SAVE_SERVICE_HOST
        fromService:
          type: web
          name: trauma-guide-save
          property: host
      - key: SAVE_SERVICE_PORT
        fromService:
          type: web
          name: trauma-guide-save
          property: port
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","http://127.0.0.1:5173","https://traumaguideresponse.onrender.com"]'
      - key: ADMIN_EMAILS
        value: '["developer@local.dev"]'
      - key: SINGLE_SERVICE_FALLBACK
        value: true
      - key: CHAT_RETENTION_DAYS
        value: 10
      - key: CHAT_MAX_SAVED_CHATS
        value: 10
      - key: VITE_API_BASE_URL
        value: ""
      - key: VITE_ENABLE_DEV_LOGIN
        value: true

databases:
  - name: trauma-guide-db
    databaseName: emotional_support
    user: support_app
    ipAllowList: []
